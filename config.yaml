# DBCLI Configuration File
# This file contains default settings for the database migration tool

database:
  defaultVendor: "mysql"           # Default database vendor (mysql/oracle)
  defaultHost: "localhost"         # Default database host
  defaultPorts:
    mysql: "3306"
    oracle: "1521"
  connectionPool:
    maxConnections: 10             # Maximum number of database connections
    maxIdleTime: 300              # Max idle time in seconds (5 minutes)
    connMaxLifetime: 3600         # Connection max lifetime in seconds (1 hour)
  connectionTimeout: 30           # Connection timeout in seconds

migration:
  defaultBatchSize: 1000          # Default batch size for data migration
  enableTransactions: true        # Enable transaction support
  enableProgress: true            # Show progress bars during migration
  autoGenerateDump: false         # Automatically generate SQL dump files
  defaultDumpPath: "./migration_dump.sql"  # Default path for SQL dump files
  enableCheckpoints: false        # Enable checkpoint/resume functionality
  validationRules:
    checkDataTypes: true          # Validate data types before migration
    checkNullConstraints: true    # Check NULL constraints
    checkForeignKeys: false       # Check foreign key constraints
    strictMode: false             # Enable strict validation mode
  commonMappings:                 # Common column mappings
    id: "id"
    user_id: "user_id"
    name: "name"
    email: "email"
    created_at: "created_at"
    updated_at: "updated_at"

logging:
  level: "info"                   # Log level (debug, info, warn, error)
  enableFileOutput: true          # Enable logging to file
  logFilePath: "./logs/dbcli.log" # Path for log files
  maxFileSize: 100               # Maximum log file size in MB
  maxBackups: 5                  # Number of backup log files to keep
  enableJSON: true               # Enable JSON formatted logs
  enableConsole: true            # Enable console output

ui:
  showProgress: true             # Show progress indicators
  enableHelp: true               # Enable help system
  confirmationRequired: true     # Require confirmation before migration
  theme: "default"               # UI theme
  enableColors: true             # Enable colored output
